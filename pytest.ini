[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
norecursedirs = research
filterwarnings =
    ignore::DeprecationWarning
    ignore::FutureWarning
markers =
    authentic: tests that require live production data or infrastructure (Source of Truth)
    integration: tests that exercise multiple services, local databases, or API contracts
    live: tests that require external network, broker, payment, or Telegram services
